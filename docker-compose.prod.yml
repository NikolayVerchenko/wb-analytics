services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - .env.prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend-build:
    build:
      context: .
      dockerfile: frontend_v2/Dockerfile
    volumes:
      - frontend_dist:/static
    command: ["sh", "-c", "rm -rf /static/* && cp -r /app/dist/. /static"]
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env.courier.prod
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8010"
    command: ["python", "scripts/run_prod_api.py"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8010/health')\""]
      interval: 15s
      timeout: 5s
      retries: 10

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      backend:
        condition: service_healthy
      frontend-build:
        condition: service_completed_successfully
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot
    restart: unless-stopped

volumes:
  postgres_data:
  frontend_dist:
  certbot_www:
