services:
  postgres:
    image: postgres:16
    container_name: wb_postgres
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wb_app -d wb_analytics"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
